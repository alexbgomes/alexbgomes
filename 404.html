<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .text-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .text-container h1 {
      font-size: 35vw;
      margin: 0;
      color: #000;
      line-height: 1;
      font-weight: 900;
      text-align: center;
      /* Optional: very faint shadow to give it a slight edge if desired, but pure black works best for the "passes behind" effect */
    }

    .home-link {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      text-decoration: none;
      font-size: 1.2rem;
      border: 1px solid #0f0;
      padding: 12px 24px;
      background-color: #000;
      z-index: 3;
      transition: all 0.3s ease;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .home-link:hover {
      background-color: #0f0;
      color: #000;
      box-shadow: 0 0 15px #0f0;
    }

    @media (max-width: 768px) {
      .text-container h1 {
        font-size: 45vw;
      }
    }
  </style>
</head>

<body>

  <!-- Matrix Rain Canvas -->
  <canvas id="matrix"></canvas>

  <!-- "Invisible" 404 text -->
  <div class="text-container">
    <h1>404</h1>
  </div>

  <a href="/" class="home-link">Return to System</a>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ'.split('');

    const fontSize = 16;
    const columns = canvas.width / fontSize;

    const drops = [];
    for (let x = 0; x < columns; x++) {
      drops[x] = 1;
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 33);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const newColumns = Math.floor(canvas.width / fontSize);

      if (newColumns > drops.length) {
        for (let x = drops.length; x < newColumns; x++) {
          drops[x] = 1;
        }
      }
    });
  </script>
</body>

</html>
